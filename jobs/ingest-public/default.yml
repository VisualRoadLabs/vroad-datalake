# =====================================================================
# default.yml  -  Descriptor de dataset publico (Data Lake VisualRoad)
#------------------------------------------------------------------
# COMO SE USA:
#   1. Sube los datos crudos a  bkt-prod-raw-public-usc1/<dataset>/
#   2. Copia este fichero, renombralo a  <dataset>.yml  y rellenalo.
#   3. Subelo a  bkt-prod-raw-public-usc1/_descriptors/  COMO ULTIMO PASO.
#      Su llegada dispara la ingesta + clasificacion automaticamente.
#   Hasta que no este ese fichero, NO se ejecuta nada.
# =====================================================================

# Identidad  (-> ds_raw_metadata.tbl_source_datasets)
dataset: ""            # nombre corto = carpeta en raw-public. Ej: culane
version: ""            # version o snapshot del dataset. Ej: "2018"
license: ""            # licencia. Ej: "research-only"
source_url: ""         # de donde se descargo (el job lo guarda en notes)
notes: ""              # texto libre (opcional)

# Procesamiento  (elige y configura el adaptador)
adapter: ""            # parser a usar: culane | tusimple | curvelanes | ...
                       # un formato ya conocido reutiliza un adapter existente
image_ext: ".jpg"      # extension de las imagenes
label_format: ""       # formato de etiqueta que entiende el adapter. Ej: txt-points
default_split: ""      # train|val|test SOLO si el dataset no trae su propio split
                       # (vacio = el adapter lee el split del propio dataset)

# Opciones (valores por defecto sensatos; normalmente no se tocan)
options:
  overwrite: false           # true = reprocesa aunque la imagen ya este en tbl_images
  skip_missing_labels: true  # ignora imagenes sin etiqueta en vez de fallar

# Campos que CALCULA el job (no los rellenes):
#   num_images, gcs_prefix (normalizado), normalized_at  -> tbl_source_datasets
#   image_id, gcs_uri, width, height, frame_id, sequence_id, split, source=public -> tbl_images
