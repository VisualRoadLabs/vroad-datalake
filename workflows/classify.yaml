# wf-prod-classify-usc1
# Ejecuta job-prod-classify-usc1 acotando QUE clasificar via args del contenedor.
# Entrada (args):
#   { "source": "user" | "public", "dataset": "<opcional>" }
# - Scheduler de usuario (00:00):  {"source":"user"}        -> clasifica lo pendiente
# - Desde wf-prod-public-ingest:   {"source":"public","dataset":"culane"}
# El job procesa solo lo aun NO clasificado (anti-join en BigQuery), asi que no
# necesita fecha: re-ejecutarlo es idempotente.

main:
  params: [args]
  steps:
    - init:
        assign:
          - project: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: ${sys.get_env("GOOGLE_CLOUD_LOCATION")}
          - source: ${default(map.get(args, "source"), "user")}
          - dataset: ${default(map.get(args, "dataset"), "")}

    - run_classify:
        # El conector ejecuta el job y espera a que termine (error si falla).
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + region + "/jobs/job-prod-classify-usc1"}
          body:
            overrides:
              containerOverrides:
                # El job lee --source/--dataset (argparse). Pasarlos como args, no
                # como env, deja intacto el resto del entorno del job. dataset=""
                # => el job no filtra por dataset (clasifica todo lo pendiente del source).
                - args: ['--source', '${source}', '--dataset', '${dataset}']
        result: execution

    - done:
        return: ${execution}
