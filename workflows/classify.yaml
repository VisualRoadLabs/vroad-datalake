# wf-prod-classify-usc1
# Ejecuta job-prod-classify-usc1 acotando QUE clasificar mediante env overrides.
# Entrada (args):
#   { "source": "user" | "public", "dataset": "<opcional>", "date": "<opcional>" }
# - Scheduler de usuario (00:00):  {"source":"user"}        -> el job usa ayer
# - Desde wf-prod-public-ingest:   {"source":"public","dataset":"culane"}

main:
  params: [args]
  steps:
    - init:
        assign:
          - project: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: ${sys.get_env("GOOGLE_CLOUD_LOCATION")}
          - source: ${default(map.get(args, "source"), "user")}
          - dataset: ${default(map.get(args, "dataset"), "")}
          - run_date: ${default(map.get(args, "date"), "")}

    - run_classify:
        # El conector ejecuta el job y espera a que termine (error si falla).
        call: googleapis.run.v2.projects.locations.jobs.run
        args:
          name: ${"projects/" + project + "/locations/" + region + "/jobs/job-prod-classify-usc1"}
          body:
            overrides:
              containerOverrides:
                - env:
                    - name: SOURCE
                      value: ${source}
                    - name: DATASET
                      value: ${dataset}
                    - name: RUN_DATE
                      value: ${run_date}
        result: execution

    - done:
        return: ${execution}
