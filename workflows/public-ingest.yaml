# wf-prod-public-ingest-usc1
# Disparos:
#   - Eventarc: al subir _descriptors/<dataset>.yml (evento Pub/Sub). El nombre
#     del objeto llega en args.data.message.attributes.objectId
#   - Manual:   gcloud workflows run ... --data='{"dataset":"culane"}'
# Flujo: resuelve dataset -> ingesta (job) -> clasificacion (wf-prod-classify).
# Manejo de error: captura, registra y termina OK para que Pub/Sub NO reintente
# en bucle un descriptor permanentemente roto (se reejecuta a mano tras arreglar).
 
main:
  params: [args]
  steps:
    - init:
        assign:
          - project: ${sys.get_env("GOOGLE_CLOUD_PROJECT_ID")}
          - region: ${sys.get_env("GOOGLE_CLOUD_LOCATION")}
          - dataset: ${default(map.get(args, "dataset"), "")}
 
    # 1. Resolver el dataset: manual (args.dataset) o desde el evento.
    - check_source:
        switch:
          - condition: ${dataset != ""}
            next: validate
        next: from_event
 
    - from_event:
        assign:
          - object_id: ${args.data.message.attributes.objectId}   # p.ej. _descriptors/culane.yml
          - parts: ${text.split(object_id, "/")}
          - filename: ${parts[len(parts) - 1]}                     # culane.yml
          - dataset: ${text.split(filename, ".")[0]}               # culane
 
    - validate:
        switch:
          - condition: ${dataset == ""}
            next: skip_log
        next: run_ingest
 
    # 2. Ingesta. Si falla, log + fin OK (sin bucle de reintentos de Pub/Sub).
    - run_ingest:
        try:
          call: googleapis.run.v2.projects.locations.jobs.run
          args:
            name: ${"projects/" + project + "/locations/" + region + "/jobs/job-prod-ingest-public-usc1"}
            body:
              overrides:
                containerOverrides:
                  - env:
                      - name: DATASET
                        value: ${dataset}
          result: ingest_exec
        except:
          as: e
          steps:
            - log_ingest_error:
                call: sys.log
                args:
                  text: ${"Ingesta fallida para " + dataset + ": " + json.encode_to_string(e)}
                  severity: ERROR
            - return_ingest_failed:
                return: ${"FAILED_INGEST: " + dataset}
 
    # 3. Clasificacion del dataset recien ingerido (source=public).
    - run_classify:
        try:
          call: googleapis.workflowexecutions.v1.projects.locations.workflows.executions.run
          args:
            workflow_id: wf-prod-classify-usc1
            location: ${region}
            project_id: ${project}
            argument: ${json.encode_to_string({"source": "public", "dataset": dataset})}
          result: classify_exec
        except:
          as: e
          steps:
            - log_classify_error:
                call: sys.log
                args:
                  text: ${"Clasificacion fallida para " + dataset + ": " + json.encode_to_string(e)}
                  severity: ERROR
            - return_classify_failed:
                return: ${"FAILED_CLASSIFY: " + dataset}
 
    - done:
        return: ${"OK: " + dataset}
 
    # --- ramas alcanzadas solo por salto ---
    - skip_log:
        call: sys.log
        args:
          text: "No se pudo resolver el dataset del evento; se omite."
          severity: WARNING
        next: skip_return
    - skip_return:
        return: "SKIPPED"
